services:
    # In the test env, every test gets the InMemoryBookRepository by default.
    # The Doctrine integration test overrides this for itself via
    # self::getContainer()->set(BookRepositoryInterface::class, $doctrineImpl).
    App\BookStore\Domain\Repository\BookRepositoryInterface:
        alias: App\BookStore\Infrastructure\InMemory\InMemoryBookRepository
        public: true

    App\BookStore\Infrastructure\InMemory\InMemoryBookRepository:
        public: true

    App\BookStore\Infrastructure\Doctrine\DoctrineBookRepository:
        public: true
