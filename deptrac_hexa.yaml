parameters:
    paths:
        - ./src/BookStore
        - ./src/Shared
        - ./src/Subscription

    layers:
        - name: Domain
          collectors:
              - { type: directory, value: '.+/Domain/.*' }

        - name: Application
          collectors:
              - { type: directory, value: '.+/Application/.*' }

        - name: Infrastructure
          collectors:
              - { type: directory, value: '.+/Infrastructure/.*' }

        - name: SubscriptionRAD
          collectors:
              - { type: directory, value: '.+/Subscription/.*' }

        # Object-pure whitelist (slide 31): attribute classes are metadata, not IO,
        # so they cross into Domain/Application by design.
        - name: Attributes
          collectors:
              - { type: classNameRegex, value: '#^Doctrine\\ORM\\Mapping#' }
              - { type: classNameRegex, value: '#^Symfony\\Component\\(Validator|Serializer|ObjectMapper|Messenger|HttpKernel|Routing|Console)\\Attribute#' }
              - { type: classNameRegex, value: '#^Symfony\\Component\\Validator\\Constraints#' }

        - name: Helpers
          collectors:
              - { type: classNameRegex, value: '#^Symfony\\Component\\Uid\\#' }

        - name: Vendors
          collectors:
              - { type: classNameRegex, value: '#^Symfony\\(?!Component\\(Uid|Validator\\Constraints|(Validator|Serializer|ObjectMapper|Messenger|HttpKernel|Routing|Console)\\Attribute)).*#' }
              - { type: classNameRegex, value: '#^Doctrine\\(?!ORM\\Mapping).*#' }

    ruleset:
        Domain:
            - Helpers
            - Attributes

        Application:
            - Domain
            - Helpers
            - Attributes

        Infrastructure:
            - Domain
            - Application
            - Vendors
            - Helpers
            - Attributes

        # RAD: no internal layering enforced.
        SubscriptionRAD:
            - Vendors
            - Helpers
            - Attributes
